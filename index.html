<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTOK CIPINANG ✨</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f8f9fa; }
        .btn-waste { background: #dc3545; }
        #loading { display: none; color: red; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0">📦 Input Stok</h3>
    <input type="text" id="staff" placeholder="Nama Staff">
    <select id="itemPilih"></select>
    <input type="number" id="qty" placeholder="Jumlah">
    <select id="satuan">
        <option>PCS</option><option>KG</option><option>PACK</option><option>ROLL</option><option>BOX</option><option>BOTOL</option>
    </select>
    <button onclick="proses('ambil')">SIMPAN PENGAMBILAN</button>
    <button onclick="proses('waste')" class="btn-waste">KIRIM WASTE (RUSAK)</button>
    <div id="loading">Sedang memproses...</div>
</div>

<div class="card" style="overflow-x:auto;">
    <h3>📊 Sisa Stok</h3>
    <table id="stokTable">
        <thead><tr><th>Barang</th><th>Awal</th><th>Ambil</th><th>Akhir</th></tr></thead>
        <tbody id="tabelBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBViL4PQMHXts_UWPu2leYs1ugFAMG_S4w",
        authDomain: "sistok-cipinang-37ae6.firebaseapp.com",
        databaseURL: "https://sistok-cipinang-37ae6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistok-cipinang-37ae6",
        appId: "1:205496083485:web:b5bb29bb675d414befd2f4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Load Data Otomatis
    db.ref('stok_barang').on('value', (snap) => {
        const data = snap.val();
        if (!data) return;
        const list = Array.isArray(data) ? data : Object.values(data);
        
        // Update Tabel
        let html = '';
        let selectHtml = '';
        list.forEach((i, idx) => {
            if(!i) return;
            const akhir = (i.awal || 0) - (i.ambil || 0);
            html += `<tr><td>${i.nama}</td><td>${i.awal}</td><td>${i.ambil||0}</td><td><b>${akhir}</b></td></tr>`;
            selectHtml += `<option value="${i.id}">${i.nama}</option>`;
        });
        document.getElementById('tabelBody').innerHTML = html;
        document.getElementById('itemPilih').innerHTML = selectHtml;
    });

    async function proses(tipe) {
        const staff = document.getElementById('staff').value;
        const id = document.getElementById('itemPilih').value;
        const qty = parseInt(document.getElementById('qty').value);
        const sat = document.getElementById('satuan').value;

        if (!staff || !qty) return alert("Isi nama & jumlah!");
        document.getElementById('loading').style.display = 'block';

        if (tipe === 'ambil') {
            const ref = db.ref('stok_barang/' + id + '/ambil');
            ref.transaction((current) => (current || 0) + qty);
        }

        await db.ref('riwayat').push({
            staff, tipe, qty, sat, idItem: id, 
            waktu: new Date().toLocaleString('id-ID')
        });

        document.getElementById('loading').style.display = 'none';
        alert("Berhasil!");
        document.getElementById('qty').value = '';
    }
</script>
</body>
</html>
