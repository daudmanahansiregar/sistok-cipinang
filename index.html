<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTOK CIPINANG PRO ✨</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { margin: 0; padding: 15px; font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1000px) { .grid { grid-template-columns: 400px 1fr; } }
        .card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .qty-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 10px; font-size: 11px; color: #64748b; text-transform: uppercase; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .dropdown-pilih { position: absolute; z-index: 100; max-height: 200px; width: 100%; background: white; border: 1px solid #ccc; display: none; overflow-y: auto; }
        .log-container { max-height: 400px; overflow-y: auto; background: #fdfdfd; padding: 10px; border-radius: 10px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 600px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="modalRekap" class="modal">
    <div class="modal-content">
        <h3>📊 Rekap Harian</h3>
        <div id="rekapTableArea"></div>
        <button onclick="salinRekapTeks()" style="background:#10b981; margin-top:10px;">📋 SALIN TEKS WA</button>
        <button onclick="tutupModal()" style="background:#64748b; margin-top:5px;">TUTUP</button>
    </div>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0; color:#1e293b;">SISTOK CIPINANG PRO ✨</h2>
        <div>
            <button style="background: #f59e0b; width:auto;" onclick="bukaRekap()">📊 REKAP</button>
            <button style="background: #1e293b; width:auto;" onclick="cetakExcel()">📥 EXCEL</button>
        </div>
    </div>

    <div class="grid">
        <div class="card-area">
            <div class="card" style="border-top: 5px solid #764ba2;">
                <h4 style="margin:0 0 10px 0; color:#764ba2;">📦 Ambil Barang</h4>
                <input type="text" id="staffAmbil" placeholder="Nama Staff">
                <div style="position: relative;">
                    <input type="text" id="searchAmbil" placeholder="🔍 Cari Barang..." onkeyup="filterDropdown('Ambil')" onfocus="showDropdown('Ambil')">
                    <select id="pilihAmbil" class="dropdown-pilih" size="5"></select>
                </div>
                <div class="qty-group">
                    <input type="number" id="qtyAmbil" placeholder="Qty">
                    <select id="satuanAmbil"></select>
                </div>
                <button onclick="simpan('ambil')" style="background: var(--grad);">SIMPAN AMBIL</button>
            </div>

            <div class="card" style="border-top: 5px solid #3b82f6; background: #f0f7ff;">
                <h4 style="margin:0 0 10px 0; color:#3b82f6;">🔄 Mutasi / Transfer</h4>
                <select id="tipeTf">
                    <option value="tfin">TF IN (Masuk dari Cabang/Pusat)</option>
                    <option value="tfout">TF OUT (Kirim ke Cabang Lain)</option>
                </select>
                <div style="position: relative;">
                    <input type="text" id="searchTf" placeholder="🔍 Cari Barang..." onkeyup="filterDropdown('Tf')" onfocus="showDropdown('Tf')">
                    <select id="pilihTf" class="dropdown-pilih" size="5"></select>
                </div>
                <div class="qty-group">
                    <input type="number" id="qtyTf" placeholder="Qty">
                    <select id="satuanTf"></select>
                </div>
                <input type="text" id="ketTf" placeholder="Keterangan (Contoh: Dari Alam Sutera)">
                <button onclick="simpan('tf')" style="background: #3b82f6;">PROSES TRANSFER</button>
            </div>

            <div class="card" style="border-top: 5px solid #ef4444; background: #fffafb;">
                <h4 style="margin:0 0 10px 0; color:#ef4444;">⚠️ Laporan Waste (Rusak)</h4>
                <input type="text" id="staffWaste" placeholder="Nama Staff">
                <div style="position: relative;">
                    <input type="text" id="searchWaste" placeholder="🔍 Cari Barang..." onkeyup="filterDropdown('Waste')" onfocus="showDropdown('Waste')">
                    <select id="pilihWaste" class="dropdown-pilih" size="5"></select>
                </div>
                <div class="qty-group">
                    <input type="number" id="qtyWaste" placeholder="Qty">
                    <select id="satuanWaste"></select>
                </div>
                <textarea id="alasanWaste" placeholder="Alasan kerusakan..."></textarea>
                <button onclick="simpan('waste')" style="background:#ef4444;">KIRIM WASTE</button>
            </div>

            <div class="card">
                <h4>Riwayat Terakhir</h4>
                <div class="log-container" id="logList"></div>
            </div>
        </div>

        <div class="card">
            <h4>Monitoring Stok</h4>
            <input type="text" id="searchTabel" placeholder="🔍 Cari di tabel..." onkeyup="filterTabel()">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Barang</th><th>Awal</th><th>Ambil</th><th>Sisa</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="tabelBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBViL4PQMHXts_UWPu2leYs1ugFAMG_S4w",
        authDomain: "sistok-cipinang-37ae6.firebaseapp.com",
        databaseURL: "https://sistok-cipinang-37ae6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistok-cipinang-37ae6",
        appId: "1:205496083485:web:b5bb29bb675d414befd2f4"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('stok_barang');
    const logRef = firebase.database().ref('riwayat_aktivitas');

    const uom = ["PACK", "ROLL", "KG", "GR", "PCS", "BOX", "L", "BOTOL"];
    let currentDB = [];
    let currentRekap = "";

    const uomHtml = uom.map(u => `<option value="${u}">${u}</option>`).join('');
    ['Ambil', 'Waste', 'Tf'].forEach(id => document.getElementById('satuan'+id).innerHTML = uomHtml);

    dbRef.on('value', snap => {
        const val = snap.val();
        if(val) {
            currentDB = Array.isArray(val) ? val : Object.values(val);
            renderTabel(); renderDropdowns();
        }
    });

    logRef.limitToLast(15).on('value', snap => {
        const logs = snap.val();
        const list = document.getElementById('logList'); list.innerHTML = '';
        if(logs) {
            Object.keys(logs).reverse().forEach(k => {
                const l = logs[k];
                let color = l.tipe === 'waste' ? 'red' : (l.tipe === 'tfin' ? 'blue' : (l.tipe === 'tfout' ? 'orange' : '#764ba2'));
                list.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee; font-size:12px; border-left: 4px solid ${color}; margin-bottom: 4px;">
                    <b style="color:${color}">${l.tipe.toUpperCase()}</b>: ${l.item} (${l.qty} ${l.satuan})<br>
                    <small>${l.staff || 'Sistem'} | ${l.jam} ${l.ket ? `| ${l.ket}` : ''}</small>
                </div>`;
            });
        }
    });

    function renderTabel() {
        const b = document.getElementById('tabelBody'); b.innerHTML = '';
        currentDB.forEach(i => {
            const akhir = (i.awal || 0) - (i.ambil || 0) + (i.sisa || 0);
            b.innerHTML += `<tr data-nama="${i.nama.toLowerCase()}">
                <td style="text-align:left">${i.nama}</td>
                <td><input type="number" style="width:50px; text-align:center;" value="${i.awal}" onchange="upd(${i.id},'awal',this.value)"></td>
                <td style="color:red">-${i.ambil||0}</td>
                <td style="font-weight:bold">${akhir}</td>
                <td><button onclick="tambah(${i.id})" style="background:#10b981; width:auto; padding:2px 8px;">+</button></td>
            </tr>`;
        });
    }

    function renderDropdowns() {
        ['Ambil', 'Waste', 'Tf'].forEach(s => {
            const sel = document.getElementById('pilih'+s); sel.innerHTML = '';
            currentDB.forEach(i => {
                const opt = document.createElement('option'); opt.text = i.nama;
                opt.onclick = () => { document.getElementById('search'+s).value = i.nama; sel.style.display='none'; sel.dataset.id = i.id; };
                sel.appendChild(opt);
            });
        });
    }

    async function simpan(tipe) {
        let staff, id, qty, sat, ket = "", finalTipe = tipe;
        
        if(tipe === 'tf') {
            finalTipe = document.getElementById('tipeTf').value;
            staff = "SISTEM TF";
            id = document.getElementById('pilihTf').dataset.id;
            qty = parseInt(document.getElementById('qtyTf').value);
            sat = document.getElementById('satuanTf').value;
            ket = document.getElementById('ketTf').value;
        } else {
            const s = tipe === 'ambil' ? 'Ambil' : 'Waste';
            staff = document.getElementById('staff'+s).value;
            id = document.getElementById('pilih'+s).dataset.id;
            qty = parseInt(document.getElementById('qty'+s).value);
            sat = document.getElementById('satuan'+s).value;
        }

        if(!id || isNaN(qty)) return alert("Isi data barang & jumlah!");

        // LOGIKA UPDATE STOK
        if(finalTipe === 'ambil') {
            await dbRef.child(id).update({ ambil: (currentDB[id].ambil || 0) + qty });
        } else if(finalTipe === 'tfin') {
            await dbRef.child(id).update({ awal: (currentDB[id].awal || 0) + qty });
        } else if(finalTipe === 'tfout') {
            await dbRef.child(id).update({ awal: (currentDB[id].awal || 0) - qty });
        }

        await logRef.push({
            staff, item: currentDB[id].nama, itemId: id, qty, satuan: sat, tipe: finalTipe, ket,
            jam: new Date().toLocaleTimeString('id-ID'), tanggal: new Date().toLocaleDateString('en-CA')
        });

        alert("Update Stok Berhasil!"); location.reload();
    }

    function filterDropdown(s) {
        const val = document.getElementById('search'+s).value.toLowerCase();
        const sel = document.getElementById('pilih'+s); sel.style.display = val ? 'block' : 'none';
        for(let o of sel.options) o.style.display = o.text.toLowerCase().includes(val) ? '' : 'none';
    }
    function showDropdown(s) { if(document.getElementById('search'+s).value) document.getElementById('pilih'+s).style.display='block'; }
    function filterTabel() {
        const val = document.getElementById('searchTabel').value.toLowerCase();
        document.querySelectorAll("#tabelBody tr").forEach(r => r.style.display = r.dataset.nama.includes(val) ? '' : 'none');
    }
    function upd(id, c, v) { dbRef.child(id).update({ [c]: parseInt(v) || 0 }); }
    function tambah(id) { let n = parseInt(prompt("Tambah Stok Awal?")); if(n) upd(id, 'awal', (currentDB[id].awal || 0) + n); }
    
    function bukaRekap() {
        const tgl = new Date().toLocaleDateString('en-CA');
        logRef.orderByChild('tanggal').equalTo(tgl).once('value', snap => {
            const logs = snap.val(); if(!logs) return alert("Belum ada data.");
            let h = `<table border="1" style="width:100%; border-collapse:collapse;"><tr><th>Barang</th><th>Ambil</th><th>Waste</th><th>TF IN</th><th>TF OUT</th></tr>`;
            let r = {};
            Object.values(logs).forEach(l => {
                if(!r[l.item]) r[l.item] = {a:0, w:0, ti:0, to:0};
                if(l.tipe==='ambil') r[l.item].a += l.qty;
                else if(l.tipe==='waste') r[l.item].w += l.qty;
                else if(l.tipe==='tfin') r[l.item].ti += l.qty;
                else if(l.tipe==='tfout') r[l.item].to += l.qty;
            });
            for(let it in r) h += `<tr><td>${it}</td><td>${r[it].a}</td><td>${r[it].w}</td><td>${r[it].ti}</td><td>${r[it].to}</td></tr>`;
            document.getElementById('
