<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTOK CIPINANG ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid #007bff; }
        h2, h3 { color: #333; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; color: white; }
        .btn-ambil { background: #007bff; }
        .btn-waste { background: #dc3545; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 10px; font-size: 14px; }
        th { background: #007bff; color: white; padding: 12px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        #status { display: none; text-align: center; font-weight: bold; color: #007bff; padding: 10px; }
        .log-list { max-height: 200px; overflow-y: auto; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>SISTOK CIPINANG ✨</h2>
        <input type="text" id="staff" placeholder="Nama Staff">
        <select id="pilihItem"></select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="qty" placeholder="Qty">
            <select id="satuan" style="flex:1;">
                <option>PACK</option><option>KG</option><option>PCS</option><option>BOX</option><option>BOTOL</option>
            </select>
        </div>
        <button class="btn-ambil" onclick="simpan('ambil')">📦 SIMPAN PENGAMBILAN</button>
        
        <hr style="margin:20px 0; border: 0; border-top: 1px solid #eee;">
        
        <h3 style="color:#dc3545;">⚠️ Laporan Waste (Rusak)</h3>
        <textarea id="alasan" placeholder="Alasan rusak..."></textarea>
        <input type="file" id="fotoFile" accept="image/*">
        <div id="status">⏳ Memproses... Mohon jangan tutup browser.</div>
        <button class="btn-waste" onclick="simpan('waste')">🔥 KIRIM LAPORAN WASTE</button>
    </div>

    <div class="card" style="border-top-color: #28a745;">
        <h3>📊 Monitoring Stok</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>Barang</th><th>Awal</th><th>Ambil</th><th>Sisa</th></tr>
                </thead>
                <tbody id="tabelBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="border-top-color: #6c757d;">
        <h3>Riwayat Terakhir</h3>
        <div id="logList" class="log-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBViL4PQMHXts_UWPu2leYs1ugFAMG_S4w",
        authDomain: "sistok-cipinang-37ae6.firebaseapp.com",
        databaseURL: "https://sistok-cipinang-37ae6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistok-cipinang-37ae6",
        appId: "1:205496083485:web:b5bb29bb675d414befd2f4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let masterData = [];

    // Tampilkan Data & Dropdown
    db.ref('stok_barang').on('value', snap => {
        const data = snap.val();
        if(!data) return;
        masterData = Array.isArray(data) ? data : Object.values(data);
        
        let tableHtml = '';
        let selectHtml = '';
        masterData.forEach(item => {
            if(!item) return;
            const sisa = (item.awal || 0) - (item.ambil || 0);
            tableHtml += `<tr><td>${item.nama}</td><td>${item.awal}</td><td style="color:red">-${item.ambil||0}</td><td><b>${sisa}</b></td></tr>`;
            selectHtml += `<option value="${item.id}">${item.nama}</option>`;
        });
        document.getElementById('tabelBody').innerHTML = tableHtml;
        document.getElementById('pilihItem').innerHTML = selectHtml;
    });

    // Tampilkan Riwayat
    db.ref('riwayat_aktivitas').limitToLast(5).on('value', snap => {
        const logs = snap.val();
        const div = document.getElementById('logList');
        div.innerHTML = '';
        if(logs) {
            Object.values(logs).reverse().forEach(l => {
                div.innerHTML += `<div style="padding:5px 0; border-bottom:1px solid #eee;">
                    ${l.jam} - <b>${l.staff}</b> ${l.tipe} ${l.item} (${l.qty})
                    ${l.foto ? `<br><a href="${l.foto}" target="_blank" style="color:blue">Lihat Foto</a>` : ''}
                </div>`;
            });
        }
    });

    async function simpan(tipe) {
        const staff = document.getElementById('staff').value;
        const id = document.getElementById('pilihItem').value;
        const qty = parseInt(document.getElementById('qty').value);
        const sat = document.getElementById('satuan').value;
        const file = document.getElementById('fotoFile').files[0];

        if(!staff || isNaN(qty)) return alert("Isi Nama Staff & Jumlah!");

        document.getElementById('status').style.display = 'block';
        let secureFotoUrl = "";

        // PROSES UPLOAD CLOUDINARY
        if(tipe === 'waste' && file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default'); // Preset publik Cloudinary demo

            try {
                const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', {
                    method: 'POST',
                    body: formData
                });
                const resData = await res.json();
                secureFotoUrl = resData.secure_url; // Link Cloudinary otomatis HTTPS (Gembok Hijau)
            } catch(e) {
                console.error(e);
                alert("Upload foto gagal, tapi data stok tetap akan disimpan.");
            }
        }

        // UPDATE STOK FIREBASE
        if(tipe === 'ambil') {
            db.ref('stok_barang/' + id + '/ambil').transaction(curr => (curr || 0) + qty);
        }

        // SIMPAN RIWAYAT
        await db.ref('riwayat_aktivitas').push({
            staff, tipe, qty, satuan: sat, item: masterData[id].nama, 
            foto: secureFotoUrl, jam: new Date().toLocaleTimeString('id-ID'),
            tanggal: new Date().toLocaleDateString('en-CA')
        });

        document.getElementById('status').style.display = 'none';
        alert("Berhasil!");
        document.getElementById('qty').value = '';
        document.getElementById('fotoFile').value = '';
    }
</script>
</body>
</html>
