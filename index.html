<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTOK CIPINANG PRO ✨</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 900px) { .grid { grid-template-columns: 450px 1fr; } }
        .card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .qty-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        
        /* STYLE BARU UNTUK SEARCH LIST */
        .search-results { 
            max-height: 200px; 
            overflow-y: auto; 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            display: none; 
            margin-bottom: 10px;
        }
        .search-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .btn-pilih { 
            background: #10b981; 
            width: auto; 
            padding: 5px 15px; 
            font-size: 12px; 
        }
        .selected-badge {
            background: #dcfce7;
            color: #166534;
            padding: 5px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
            font-weight: bold;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 10px; color: #64748b; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#1e293b;">SISTOK CIPINANG PRO ✨</h2>

    <div class="grid">
        <div>
            <div class="card" style="border-left: 6px solid #764ba2;">
                <h4 style="margin-top:0; color:#764ba2;">📦 Ambil Barang</h4>
                <input type="text" id="staffAmbil" placeholder="Nama Staff">
                <input type="text" id="searchAmbil" placeholder="🔍 Cari Nama Barang..." onkeyup="cariBarang('Ambil')">
                <div id="resAmbil" class="search-results"></div>
                <div id="badgeAmbil" class="selected-badge"></div>
                
                <div class="qty-group">
                    <input type="number" id="qtyAmbil" placeholder="Qty">
                    <select id="satuanAmbil"></select>
                </div>
                <button onclick="simpan('ambil')" style="background: var(--grad);">SIMPAN AMBIL</button>
            </div>

            <div class="card" style="border-left: 6px solid #3b82f6; background: #f0f7ff;">
                <h4 style="margin-top:0; color:#3b82f6;">🔄 Transfer (TF IN / OUT)</h4>
                <select id="tipeTf">
                    <option value="tfin">TF IN (Masuk)</option>
                    <option value="tfout">TF OUT (Keluar)</option>
                </select>
                <input type="text" id="searchTf" placeholder="🔍 Cari Nama Barang..." onkeyup="cariBarang('Tf')">
                <div id="resTf" class="search-results"></div>
                <div id="badgeTf" class="selected-badge"></div>

                <div class="qty-group">
                    <input type="number" id="qtyTf" placeholder="Qty">
                    <select id="satuanTf"></select>
                </div>
                <input type="text" id="ketTf" placeholder="Keterangan (Contoh: Dari Alam Sutera)">
                <button onclick="simpan('tf')" style="background: #3b82f6;">PROSES TRANSFER</button>
            </div>

            <div class="card" style="border-left: 6px solid #ef4444;">
                <h4 style="margin-top:0; color:#ef4444;">⚠️ Laporan Waste</h4>
                <input type="text" id="staffWaste" placeholder="Nama Staff">
                <input type="text" id="searchWaste" placeholder="🔍 Cari Nama Barang..." onkeyup="cariBarang('Waste')">
                <div id="resWaste" class="search-results"></div>
                <div id="badgeWaste" class="selected-badge"></div>

                <div class="qty-group">
                    <input type="number" id="qtyWaste" placeholder="Qty">
                    <select id="satuanWaste"></select>
                </div>
                <button onclick="simpan('waste')" style="background: #ef4444;">KIRIM WASTE</button>
            </div>
        </div>

        <div class="card">
            <h4>Monitoring Stok</h4>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Nama Barang</th><th>Awal</th><th>Ambil</th><th>Sisa</th></tr>
                    </thead>
                    <tbody id="tabelBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBViL4PQMHXts_UWPu2leYs1ugFAMG_S4w",
        authDomain: "sistok-cipinang-37ae6.firebaseapp.com",
        databaseURL: "https://sistok-cipinang-37ae6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistok-cipinang-37ae6",
        appId: "1:205496083485:web:b5bb29bb675d414befd2f4"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('stok_barang');
    const logRef = firebase.database().ref('riwayat_aktivitas');

    let currentDB = [];
    const uom = ["PACK", "ROLL", "KG", "GR", "PCS", "BOX", "L", "BOTOL"];
    const uomHtml = uom.map(u => `<option value="${u}">${u}</option>`).join('');
    ['Ambil', 'Tf', 'Waste'].forEach(id => document.getElementById('satuan'+id).innerHTML = uomHtml);

    dbRef.on('value', snap => {
        const val = snap.val();
        if(val) {
            currentDB = Array.isArray(val) ? val : Object.values(val);
            renderTabel();
        }
    });

    function cariBarang(suffix) {
        const input = document.getElementById('search'+suffix).value.toLowerCase();
        const resDiv = document.getElementById('res'+suffix);
        resDiv.innerHTML = '';
        
        if(input.length < 1) { resDiv.style.display = 'none'; return; }
        
        const filtered = currentDB.filter(i => i && i.nama.toLowerCase().includes(input));
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(item => {
                resDiv.innerHTML += `
                    <div class="search-item">
                        <span>${item.nama}</span>
                        <button class="btn-pilih" onclick="pilihBarang('${suffix}', ${item.id}, '${item.nama}')">PILIH</button>
                    </div>`;
            });
        } else {
            resDiv.innerHTML = '<div style="padding:10px">Barang tidak ditemukan</div>';
        }
    }

    function pilihBarang(suffix, id, nama) {
        const badge = document.getElementById('badge'+suffix);
        badge.innerHTML = "Terpilih: " + nama;
        badge.style.display = 'block';
        badge.dataset.id = id;
        document.getElementById('res'+suffix).style.display = 'none';
        document.getElementById('search'+suffix).value = ''; 
    }

    function renderTabel() {
        const b = document.getElementById('tabelBody'); b.innerHTML = '';
        currentDB.forEach(i => {
            if(!i) return;
            const sisa = (i.awal || 0) - (i.ambil || 0);
            b.innerHTML += `<tr>
                <td style="text-align:left">${i.nama}</td>
                <td>${i.awal}</td>
                <td style="color:red">-${i.ambil||0}</td>
                <td style="font-weight:bold">${sisa}</td>
            </tr>`;
        });
    }

    async function simpan(tipe) {
        let suffix = tipe === 'tf' ? 'Tf' : (tipe === 'ambil' ? 'Ambil' : 'Waste');
        let id = document.getElementById('badge'+suffix).dataset.id;
        let qty = parseInt(document.getElementById('qty'+suffix).value);
        let sat = document.getElementById('satuan'+suffix).value;
        let staff = document.getElementById('staff'+suffix)?.value || "SISTEM";
        let finalTipe = (tipe === 'tf') ? document.getElementById('tipeTf').value : tipe;

        if(!id || isNaN(qty)) return alert("Silakan PILIH barang dulu dan isi jumlah!");

        // Update Logika Firebase
        if(finalTipe === 'ambil') {
            await dbRef.child(id).update({ ambil: (currentDB[id].ambil || 0) + qty });
        } else if(finalTipe === 'tfin') {
            await dbRef.child(id).update({ awal: (currentDB[id].awal || 0) + qty });
        } else if(finalTipe === 'tfout' || finalTipe === 'waste') {
            await dbRef.child(id).update({ awal: (currentDB[id].awal || 0) - qty });
        }

        await logRef.push({
            staff, item: currentDB[id].nama, qty, satuan: sat, tipe: finalTipe,
            jam: new Date().toLocaleTimeString('id-ID'), tanggal: new Date().toLocaleDateString('en-CA')
        });

        alert("Berhasil disimpan!");
        location.reload();
    }
</script>
</body>
</html>
